<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond noir -->
  <rect width="512" height="512" rx="100" fill="#07070f"/>
  
  <!-- Pokéball - moitié rouge -->
  <clipPath id="top">
    <rect x="56" y="56" width="400" height="200"/>
  </clipPath>
  <circle cx="256" cy="256" r="200" fill="#f5c518" clip-path="url(#top)"/>
  
  <!-- Pokéball - moitié noire -->
  <clipPath id="bot">
    <rect x="56" y="256" width="400" height="200"/>
  </clipPath>
  <circle cx="256" cy="256" r="200" fill="#1a1a2e" clip-path="url(#bot)"/>
  
  <!-- Bordure extérieure -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#f5c518" stroke-width="12"/>
  
  <!-- Ligne centrale -->
  <rect x="56" y="244" width="400" height="24" fill="#f5c518"/>
  
  <!-- Cercle central extérieur -->
  <circle cx="256" cy="256" r="52" fill="#f5c518"/>
  
  <!-- Cercle central intérieur -->
  <circle cx="256" cy="256" r="36" fill="#07070f" stroke="#f5c518" stroke-width="8"/>
  
  <!-- Point central -->
  <circle cx="256" cy="256" r="16" fill="#f5c518"/>
</svg>
